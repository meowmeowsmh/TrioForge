<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>LLM Not Found</title>
        <link rel="stylesheet" href="404.css" />
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/3.3.7/css/bootstrap.min.css"
        />
        <style>
            .page_404 {
                padding: 40px 0;
                background: #fff;
                font-family: "Arvo", serif;
            }
            .page_404 img {
                width: 100%;
            }
            .four_zero_four_bg {
                background-image: url(https://cdn.dribbble.com/users/285475/screenshots/2083086/dribbble_1.gif);
                height: 400px;
                background-position: center;
            }
            .four_zero_four_bg h1 {
                font-size: 80px;
            }
            .four_zero_four_bg h3 {
                font-size: 80px;
            }
            .link_404 {
                color: #fff !important;
                padding: 10px 20px;
                background: #39ac31;
                margin: 20px 0;
                display: inline-block;
            }
            .contant_box_404 {
                margin-top: -50px;
            }
            #status-msg {
                min-height: 1.8em;
                font-weight: bold;
                color: #d9534f;
                margin-top: 10px;
            }
        </style>
    </head>
    <body>

        <section class="page_404">
            <div class="container">
                <div class="row">
                    <div class="col-sm-12">
                        <div class="col-sm-10 col-sm-offset-1 text-center">
                            <div class="four_zero_four_bg">
                                <h1 class="text-center">404</h1>
                            </div>
                            <div class="contant_box_404">
                                <h3 class="h2">Looks like this model wandered off</h3>
                                <p>The LLM you're trying to reach isn't loaded or doesn't exist!</p>
                                <a href="#" class="link_404" id="back-link">Back to Chat</a>
                                <div id="status-msg"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- ========== MP3 with fallback ========== -->
        <audio id="bg-music" loop preload="auto">
            <source src="Meatball-Parade(chotic.com).mp3" type="audio/mpeg">
            <source src="Meatball-Parade(chosic.com).mp3" type="audio/mpeg">
        </audio>

        <script>
            (function() {
                'use strict';

                const music = document.getElementById('bg-music');
                let musicStarted = false;
                let primaryFailed = false;

                // --------------------------------------------------------------
                // 1.  Autoplay with fallback on user interaction
                // --------------------------------------------------------------
                function tryPlay() {
                    if (musicStarted) return;
                    music.play().then(() => {
                        musicStarted = true;
                        removeInteractionListeners();
                    }).catch(() => {
                        addInteractionListeners();
                    });
                }

                function addInteractionListeners() {
                    const events = ['click', 'keydown', 'touchstart', 'scroll', 'mousemove'];
                    events.forEach(ev => {
                        document.addEventListener(ev, onInteraction);
                    });
                }

                function removeInteractionListeners() {
                    const events = ['click', 'keydown', 'touchstart', 'scroll', 'mousemove'];
                    events.forEach(ev => {
                        document.removeEventListener(ev, onInteraction);
                    });
                }

                function onInteraction() {
                    if (musicStarted) return;
                    music.play().then(() => {
                        musicStarted = true;
                        removeInteractionListeners();
                    }).catch(() => {});
                }

                // If the primary source fails to load, the browser will automatically try the next <source>
                // But we also want to log it and adjust volume if needed.
                music.addEventListener('error', function(e) {
                    // If the first source fails, the browser will move to the next one automatically.
                    // We can just log.
                    console.log('Audio source error, fallback will be used if available.');
                });

                // Set volume once the audio is ready
                music.addEventListener('loadeddata', function() {
                    music.volume = 0.8;
                });

                tryPlay();
                window.addEventListener('load', function() {
                    if (!musicStarted) tryPlay();
                });

                // --------------------------------------------------------------
                // 2.  Auto-check if Flask app is running on page load
                // --------------------------------------------------------------
                const link = document.getElementById('back-link');
                const statusMsg = document.getElementById('status-msg');
                const TROLL_DELAY_MS = 4000;   // for manual button
                const AUTO_REDIRECT_DELAY = 2000; // for auto-redirect (2 seconds)
                let isNavigating = false;

                const DESTINATION = 'http://127.0.0.1:5000/';

                function checkAndRedirect(manual = false) {
                    if (isNavigating) return;
                    isNavigating = true;

                    // Ensure music is playing
                    if (!musicStarted) {
                        music.play().catch(() => {});
                    }
                    music.volume = 1.0;

                    statusMsg.textContent = '🔍 Checking if chat is available...';
                    statusMsg.style.color = '#f0ad4e';

                    const controller = new AbortController();
                    const timeoutId = setTimeout(() => controller.abort(), 3000);

                    fetch(DESTINATION, { method: 'HEAD', signal: controller.signal })
                        .then(response => {
                            clearTimeout(timeoutId);
                            if (response.ok) {
                                statusMsg.textContent = '✅ Chat found! Redirecting...';
                                statusMsg.style.color = '#5cb85c';
                                const delay = manual ? TROLL_DELAY_MS : AUTO_REDIRECT_DELAY;
                                setTimeout(() => {
                                    window.location.href = DESTINATION;
                                }, delay);
                            } else {
                                statusMsg.textContent = '❌ Chat not available. Staying on this page.';
                                statusMsg.style.color = '#d9534f';
                                setTimeout(() => {
                                    statusMsg.textContent = '';
                                    isNavigating = false;
                                }, 3000);
                            }
                        })
                        .catch(err => {
                            clearTimeout(timeoutId);
                            statusMsg.textContent = '⚠️ Could not reach chat. Staying here.';
                            statusMsg.style.color = '#d9534f';
                            setTimeout(() => {
                                statusMsg.textContent = '';
                                isNavigating = false;
                            }, 3000);
                        });
                }

                // Run the check automatically when the page loads
                window.addEventListener('load', function() {
                    setTimeout(() => {
                        checkAndRedirect(false);
                    }, 500);
                });

                // Manual click on the "Back to Chat" button – uses longer troll delay
                link.addEventListener('click', function(e) {
                    e.preventDefault();
                    checkAndRedirect(true);
                });

                // --------------------------------------------------------------
                // 3.  Cleanup on page unload
                // --------------------------------------------------------------
                window.addEventListener('beforeunload', function() {
                    music.pause();
                });

            })();
        </script>

    </body>
</html>
