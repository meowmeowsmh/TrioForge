        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        //  CANVAS SIZING
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        function sizeCanvas(canvas) {
            const rect = canvas.parentElement.getBoundingClientRect();
            const dpr = window.devicePixelRatio || 1;
            const cssW = rect.width,
                cssH = rect.height;
            canvas.width = Math.round(cssW * dpr);
            canvas.height = Math.round(cssH * dpr);
            canvas.style.width = cssW + 'px';
            canvas.style.height = cssH + 'px';
            const ctx = canvas.getContext('2d');
            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
            return { w: cssW, h: cssH };
        }

        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        //  WALKING BLOB — with legs, arms, and movement!
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        function createBlob(x, y, emoji, color, speed = 1.0, size = 22) {
            return {
                x,
                y,
                baseY: y,
                emoji,
                color,
                speed: speed * (0.6 + Math.random() * 0.5),
                size,
                direction: Math.random() > 0.5 ? 1 : -1,
                stepPhase: Math.random() * Math.PI * 2,
                walkCycle: Math.random() * 100,
                armSwing: 0,
                legOffset: 0,
                // for random pauses
                pauseTimer: 0,
                isPaused: false,
                pauseDuration: 0,
                // unique look
                eyeColor: '#2b2b2b',
                blush: true,
                // drink behavior
                hasDrink: false,
                isDrinking: false,
                drinkTimer: 0,
                drinkCooldown: 100 + Math.random() * 200,
                drinkProgress: 0
            };
        }

        function updateBlob(blob, w, h, t, speedMul = 1) {
            if (!blob) return;

            const spd = blob.speed * speedMul * 0.6;

            // Drinking behavior (takes priority over walking/pausing)
            if (blob.hasDrink) {
                if (blob.isDrinking) {
                    blob.drinkTimer += 1;
                    blob.drinkProgress = Math.min(1, blob.drinkTimer / 30);
                    if (blob.drinkTimer > 70) {
                        blob.isDrinking = false;
                        blob.drinkTimer = 0;
                        blob.drinkProgress = 0;
                        blob.drinkCooldown = 150 + Math.random() * 250;
                    }
                    return;
                } else {
                    blob.drinkCooldown -= 1;
                    if (blob.drinkCooldown <= 0) {
                        blob.isDrinking = true;
                        blob.isPaused = false;
                        blob.drinkTimer = 0;
                        blob.drinkProgress = 0;
                        return;
                    }
                }
            }

            // Random pause behavior
            if (blob.isPaused) {
                blob.pauseTimer += 1;
                if (blob.pauseTimer > blob.pauseDuration) {
                    blob.isPaused = false;
                    blob.pauseTimer = 0;
                    // Maybe change direction after pause
                    if (Math.random() > 0.5) blob.direction *= -1;
                }
                return;
            }

            // Random chance to pause
            if (Math.random() < 0.003) {
                blob.isPaused = true;
                blob.pauseTimer = 0;
                blob.pauseDuration = 40 + Math.random() * 80;
                return;
            }

            blob.x += blob.direction * spd * 1.2;
            blob.stepPhase += spd * 0.06;
            blob.walkCycle += spd * 0.04;
            blob.armSwing = Math.sin(blob.walkCycle) * 0.3;
            blob.legOffset = Math.sin(blob.walkCycle);

            // Bob up and down with walking
            const bobAmt = 2.5 + Math.abs(Math.sin(blob.walkCycle)) * 2;
            blob.y = blob.baseY + Math.sin(blob.walkCycle) * bobAmt;

            // Head tilt based on direction
            blob.headTilt = Math.sin(blob.walkCycle * 0.5) * 0.04;

            // Bounds
            const margin = 30 + blob.size;
            if (blob.x > w - margin) { blob.direction = -1;
                blob.x = w - margin; }
            if (blob.x < margin) { blob.direction = 1;
                blob.x = margin; }
        }

        function drawWalkingBlob(ctx, blob, t) {
            const { x, y, size: r, color, emoji, direction, stepPhase, walkCycle, armSwing, legOffset, baseY } = blob;
            const d = direction;
            const drinking = blob.isDrinking;
            // Ease in/out for the can lifting to "mouth" and back down
            const liftT = blob.drinkProgress <= 0.5 ? blob.drinkProgress * 2 : (1 - blob.drinkProgress) * 2;
            const lift = drinking ? Math.max(0, Math.min(1, liftT * 1.3)) : 0;

            ctx.save();
            ctx.translate(x, y);

            // ── Shadow ──
            ctx.shadowColor = 'rgba(0,0,0,0.15)';
            ctx.shadowBlur = 12;
            ctx.shadowOffsetX = 0;
            ctx.shadowOffsetY = 4;
            ctx.fillStyle = 'rgba(0,0,0,0.10)';
            ctx.beginPath();
            ctx.ellipse(0, r * 1.15, r * 0.8, r * 0.25, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;
            ctx.shadowOffsetX = 0;
            ctx.shadowOffsetY = 0;

            // ── Legs ── (stand still while drinking)
            const legLen = r * 0.7;
            const legThick = r * 0.16;
            const legPhase = drinking ? 0.3 : walkCycle;
            ctx.strokeStyle = color;
            ctx.lineWidth = legThick;
            ctx.lineCap = 'round';

            // Left leg
            const lx1 = -r * 0.2,
                ly1 = r * 0.75;
            const lx2 = lx1 + Math.sin(legPhase + 0.3) * r * 0.4 * d * (drinking ? 0 : 1);
            const ly2 = ly1 + legLen * 0.8 + Math.abs(Math.sin(legPhase + 0.3)) * r * 0.15 * (drinking ? 0.3 : 1);
            ctx.beginPath();
            ctx.moveTo(lx1, ly1);
            ctx.quadraticCurveTo((lx1 + lx2) / 2 + Math.sin(legPhase + 0.3) * r * 0.2 * d * (drinking ? 0 : 1), ly1 + legLen * 0.5, lx2, ly2);
            ctx.stroke();

            // Right leg
            const rx1 = r * 0.2,
                ry1 = r * 0.75;
            const rx2 = rx1 + Math.sin(legPhase + 0.3 + Math.PI) * r * 0.4 * d * (drinking ? 0 : 1);
            const ry2 = ry1 + legLen * 0.8 + Math.abs(Math.sin(legPhase + 0.3 + Math.PI)) * r * 0.15 * (drinking ? 0.3 : 1);
            ctx.beginPath();
            ctx.moveTo(rx1, ry1);
            ctx.quadraticCurveTo((rx1 + rx2) / 2 + Math.sin(legPhase + 0.3 + Math.PI) * r * 0.2 * d * (drinking ? 0 : 1), ry1 + legLen * 0.5, rx2,
                ry2);
            ctx.stroke();

            // ── Feet ──
            ctx.fillStyle = color;
            ctx.shadowBlur = 4;
            ctx.shadowOffsetY = 2;
            // Left foot
            ctx.beginPath();
            ctx.ellipse(lx2, ly2 + legThick * 0.5, r * 0.2, r * 0.12, 0, 0, Math.PI * 2);
            ctx.fill();
            // Right foot
            ctx.beginPath();
            ctx.ellipse(rx2, ry2 + legThick * 0.5, r * 0.2, r * 0.12, 0, 0, Math.PI * 2);
            ctx.fill();

            // ── Body ──
            ctx.shadowBlur = 10;
            ctx.shadowOffsetY = 3;
            const squash = drinking ? 1 : 1 + Math.sin(walkCycle) * 0.04;
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.ellipse(0, 0, r, r * 1.05 * squash, 0, 0, Math.PI * 2);
            ctx.fill();

            // ── Body highlight ──
            ctx.shadowBlur = 0;
            ctx.fillStyle = 'rgba(255,255,255,0.20)';
            ctx.beginPath();
            ctx.ellipse(-r * 0.3 * d, -r * 0.35, r * 0.25, r * 0.15, -0.3 * d, 0, Math.PI * 2);
            ctx.fill();

            // ── Arms ──
            ctx.strokeStyle = color;
            ctx.lineWidth = r * 0.14;
            ctx.lineCap = 'round';

            // "Free" arm — swings normally, or hangs relaxed while drinking
            const freeArmSide = -d; // opposite side from the drinking hand when facing d
            const flx1 = freeArmSide * r * 0.85,
                fly1 = -r * 0.15;
            const flx2 = flx1 + (drinking ? 0 : Math.sin(walkCycle + 0.8) * r * 0.45 * freeArmSide);
            const fly2 = fly1 + r * 0.5 + (drinking ? 0 : Math.abs(Math.sin(walkCycle + 0.8)) * r * 0.1);
            ctx.beginPath();
            ctx.moveTo(flx1, fly1);
            ctx.quadraticCurveTo((flx1 + flx2) / 2, fly1 + r * 0.3, flx2, fly2);
            ctx.stroke();
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.arc(flx2, fly2, r * 0.1, 0, Math.PI * 2);
            ctx.fill();

            // "Drink" arm — bends up toward the mouth when drinking, otherwise swings like normal
            const drinkSide = d;
            const dax1 = drinkSide * r * 0.85,
                day1 = -r * 0.15;
            let dax2, day2;
            if (blob.hasDrink) {
                // interpolate from resting position to "can at mouth" position
                const restX = dax1 + Math.sin(walkCycle + 0.8 + Math.PI) * r * 0.45 * drinkSide;
                const restY = day1 + r * 0.5 + Math.abs(Math.sin(walkCycle + 0.8 + Math.PI)) * r * 0.1;
                const raisedX = drinkSide * r * 0.35;
                const raisedY = -r * 0.55;
                dax2 = restX + (raisedX - restX) * lift;
                day2 = restY + (raisedY - restY) * lift;
            } else {
                dax2 = dax1 + Math.sin(walkCycle + 0.8 + Math.PI) * r * 0.45 * drinkSide;
                day2 = day1 + r * 0.5 + Math.abs(Math.sin(walkCycle + 0.8 + Math.PI)) * r * 0.1;
            }
            ctx.beginPath();
            ctx.moveTo(dax1, day1);
            ctx.quadraticCurveTo((dax1 + dax2) / 2 + (lift > 0 ? 0 : Math.sin(walkCycle + 0.8 + Math.PI) * r * 0.2 * drinkSide), day1 + r * 0.3, dax2, day2);
            ctx.stroke();
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.arc(dax2, day2, r * 0.1, 0, Math.PI * 2);
            ctx.fill();

            // ── Soda can (only for blobs that carry one) ──
            if (blob.hasDrink) {
                ctx.save();
                ctx.translate(dax2, day2);
                // tilt the can toward the mouth as it lifts
                ctx.rotate(-drinkSide * (0.15 + lift * 0.9));
                const canW = r * 0.22,
                    canH = r * 0.5;
                // can body
                const canGrad = ctx.createLinearGradient(-canW / 2, 0, canW / 2, 0);
                canGrad.addColorStop(0, '#e53935');
                canGrad.addColorStop(0.5, '#ff6f60');
                canGrad.addColorStop(1, '#c62828');
                ctx.fillStyle = canGrad;
                ctx.shadowColor = 'rgba(0,0,0,0.25)';
                ctx.shadowBlur = 3;
                ctx.beginPath();
                ctx.roundRect(-canW / 2, -canH * 0.75, canW, canH, canW * 0.25);
                ctx.fill();
                // pull tab
                ctx.shadowBlur = 0;
                ctx.fillStyle = '#c0c0c0';
                ctx.beginPath();
                ctx.ellipse(0, -canH * 0.75, canW * 0.28, canW * 0.12, 0, 0, Math.PI * 2);
                ctx.fill();
                // label stripe
                ctx.fillStyle = 'rgba(255,255,255,0.85)';
                ctx.fillRect(-canW / 2, -canH * 0.15, canW, canH * 0.16);
                ctx.restore();

                // little "fizz" sparkle bubbles while actually sipping (near peak lift)
                if (lift > 0.7) {
                    ctx.fillStyle = 'rgba(255,255,255,0.7)';
                    for (let i = 0; i < 3; i++) {
                        const bx = dax2 + Math.sin(t * 0.1 + i) * r * 0.15;
                        const by = day2 - r * 0.3 - i * r * 0.12 - (t * 0.05) % (r * 0.3);
                        ctx.beginPath();
                        ctx.arc(bx, by, r * 0.03, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }
            }

            // ── Eyes ──
            ctx.shadowBlur = 0;
            const eyeY = -r * 0.05;
            const eyeSpacing = r * 0.32;
            const eyeR = r * 0.22;
            const pupilR = r * 0.11;
            const lookX = d * 0.15;

            // Blink (eyes happily close a bit while drinking)
            const blinkCycle = Math.sin(t * 0.03 + 2.3);
            const eyeSquash = drinking ? (0.3 + (1 - lift) * 0.5) : (blinkCycle > 0.965 ? 0.12 : 1);

            // White of eyes
            ctx.fillStyle = '#fff';
            ctx.shadowBlur = 2;
            ctx.shadowOffsetY = 1;
            ctx.beginPath();
            ctx.ellipse(-eyeSpacing, eyeY, eyeR, eyeR * eyeSquash, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.ellipse(eyeSpacing, eyeY, eyeR, eyeR * eyeSquash, 0, 0, Math.PI * 2);
            ctx.fill();

            if (eyeSquash > 0.4) {
                // Pupils
                ctx.fillStyle = blob.eyeColor || '#2b2b2b';
                ctx.shadowBlur = 0;
                ctx.beginPath();
                ctx.arc(-eyeSpacing + lookX * eyeR * 0.5, eyeY, pupilR, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(eyeSpacing + lookX * eyeR * 0.5, eyeY, pupilR, 0, Math.PI * 2);
                ctx.fill();

                // Eye shine
                ctx.fillStyle = 'rgba(255,255,255,0.5)';
                ctx.beginPath();
                ctx.arc(-eyeSpacing + lookX * eyeR * 0.5 - pupilR * 0.3, eyeY - pupilR * 0.35, pupilR * 0.3, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(eyeSpacing + lookX * eyeR * 0.5 - pupilR * 0.3, eyeY - pupilR * 0.35, pupilR * 0.3, 0, Math.PI * 2);
                ctx.fill();
            }

            // ── Blush ──
            if (blob.blush !== false) {
                ctx.fillStyle = 'rgba(255,110,110,0.25)';
                ctx.shadowBlur = 0;
                ctx.beginPath();
                ctx.ellipse(-eyeSpacing - r * 0.25, r * 0.2, r * 0.2, r * 0.12, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.ellipse(eyeSpacing + r * 0.25, r * 0.2, r * 0.2, r * 0.12, 0, 0, Math.PI * 2);
                ctx.fill();
            }

            // ── Mouth ──
            ctx.strokeStyle = '#2b2b2b';
            ctx.lineWidth = Math.max(1.5, r * 0.06);
            ctx.shadowBlur = 0;
            if (drinking && lift > 0.5) {
                // small "o" sipping mouth near the peak of the lift
                ctx.beginPath();
                ctx.arc(0, r * 0.28, r * 0.09, 0, Math.PI * 2);
                ctx.stroke();
            } else {
                ctx.beginPath();
                ctx.arc(0, r * 0.25, r * 0.2, 0.15 * Math.PI, 0.85 * Math.PI);
                ctx.stroke();
            }

            // ── Emoji above head ──
            ctx.shadowBlur = 6;
            ctx.shadowOffsetY = 2;
            ctx.font = `${Math.round(r * 0.9)}px "Segoe UI Emoji", "Apple Color Emoji", "Noto Color Emoji", sans-serif`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'bottom';
            ctx.fillStyle = '#fff';
            ctx.shadowColor = 'rgba(0,0,0,0.4)';
            ctx.fillText(emoji, 0, -r * 1.2 - Math.abs(Math.sin(walkCycle)) * 2);

            ctx.restore();
        }

        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        //  SEASON SCENES
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

        // ── SUMMER — beach with medium-speed sea and improved fish splash ──
        function drawSummer(ctx, w, h, t, blobs) {
            const sky = ctx.createLinearGradient(0, 0, 0, h);
            sky.addColorStop(0, '#4a90d9');
            sky.addColorStop(0.6, '#87CEEB');
            sky.addColorStop(1, '#cdeffd');
            ctx.fillStyle = sky;
            ctx.fillRect(0, 0, w, h);

            const sunX = w * 0.82,
                sunY = h * 0.18;
            const grd = ctx.createRadialGradient(sunX, sunY, 0, sunX, sunY, 60);
            grd.addColorStop(0, 'rgba(255,240,150,1)');
            grd.addColorStop(0.5, 'rgba(255,200,50,0.8)');
            grd.addColorStop(1, 'rgba(255,200,50,0)');
            ctx.fillStyle = grd;
            ctx.beginPath();
            ctx.arc(sunX, sunY, 60, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#fdd835';
            ctx.beginPath();
            ctx.arc(sunX, sunY, 28, 0, Math.PI * 2);
            ctx.fill();

            // ── Sea ──
            const seaTop = h * 0.50;
            const seaBottom = h * 0.68;
            const sea = ctx.createLinearGradient(0, seaTop, 0, seaBottom);
            sea.addColorStop(0, '#1e88e5');
            sea.addColorStop(0.5, '#29b6f6');
            sea.addColorStop(1, '#4fc3f7');
            ctx.fillStyle = sea;
            ctx.fillRect(0, seaTop, w, seaBottom - seaTop);

            // ── Wave lines (slower: t * 0.02 instead of 0.03) ──
            for (let i = 0; i < 4; i++) {
                const wy = seaTop + (i + 1) * (seaBottom - seaTop) / 5;
                ctx.strokeStyle = `rgba(255,255,255,${0.35 - i * 0.06})`;
                ctx.lineWidth = 1.5;
                ctx.beginPath();
                for (let x = 0; x <= w; x += 6) {
                    const yy = wy + Math.sin(x * 0.05 + t * 0.02 + i) * 2.2;
                    if (x === 0) ctx.moveTo(x, yy);
                    else ctx.lineTo(x, yy);
                }
                ctx.stroke();
            }

            // ── Fish leaping (slower: t * 0.01 instead of 0.02) ──
            const fishCycle = (t * 0.01) % 200;
            if (fishCycle < 40) {
                const progress = fishCycle / 40;
                const fx = w * 0.38 + progress * 70;
                const fy = seaTop + (seaBottom - seaTop) * 0.35 - Math.sin(progress * Math.PI) * 34;
                // Draw the fish
                ctx.save();
                ctx.translate(fx, fy);
                ctx.rotate(-0.5 + progress * 1.0);
                ctx.fillStyle = '#0288d1';
                ctx.beginPath();
                ctx.ellipse(0, 0, 10, 4, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.moveTo(-9, 0);
                ctx.lineTo(-17, -5);
                ctx.lineTo(-17, 5);
                ctx.closePath();
                ctx.fill();
                ctx.fillStyle = 'rgba(255,255,255,0.9)';
                ctx.beginPath();
                ctx.arc(6, -1, 1.2, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();

                // ── Improved splash: fade in/out with progress ──
                // Splash appears near the start (emerging) and near the end (diving)
                const splashAlpha = Math.sin(progress * Math.PI) * 0.6; // 0 at edges, peak at 0.5
                if (splashAlpha > 0.05) {
                    const splashX = w * 0.38 - 4; // fixed position where fish takes off
                    const splashY = seaTop + (seaBottom - seaTop) * 0.35;
                    // Main splash ellipse
                    ctx.globalAlpha = splashAlpha;
                    ctx.fillStyle = 'rgba(255,255,255,0.7)';
                    ctx.beginPath();
                    ctx.ellipse(splashX, splashY, 6 + progress * 4, 2.5 + progress * 2, 0, 0, Math.PI * 2);
                    ctx.fill();
                    // Some droplets
                    for (let i = 0; i < 5; i++) {
                        const angle = i * 1.2 + progress * 2;
                        const dist = 6 + Math.sin(progress * 10 + i) * 4;
                        const dx = Math.cos(angle) * dist;
                        const dy = Math.sin(angle) * dist * 0.5 - 2;
                        ctx.fillStyle = 'rgba(255,255,255,0.5)';
                        ctx.beginPath();
                        ctx.arc(splashX + dx, splashY + dy, 1.2 + Math.sin(progress * 8 + i) * 0.8, 0, Math.PI * 2);
                        ctx.fill();
                    }
                    ctx.globalAlpha = 1;
                }
            }

            // ── Shoreline foam (slower: t * 0.025 instead of 0.05) ──
            ctx.fillStyle = 'rgba(255,255,255,0.55)';
            ctx.beginPath();
            for (let x = 0; x <= w; x += 8) {
                const yy = seaBottom + Math.sin(x * 0.08 + t * 0.025) * 3;
                if (x === 0) ctx.moveTo(x, yy);
                else ctx.lineTo(x, yy);
            }
            ctx.lineTo(w, seaBottom + 10);
            ctx.lineTo(0, seaBottom + 10);
            ctx.closePath();
            ctx.fill();

            // ── Sand / beach ──
            ctx.fillStyle = '#f0d9a8';
            ctx.fillRect(0, seaBottom, w, h - seaBottom);
            for (let i = 0; i < 25; i++) {
                const sx = (i * 53 + 17) % w;
                const sy = seaBottom + 6 + (i * 13) % Math.max(1, (h - seaBottom - 10));
                ctx.fillStyle = 'rgba(180,140,90,0.25)';
                ctx.beginPath();
                ctx.arc(sx, sy, 1.2, 0, Math.PI * 2);
                ctx.fill();
            }

            drawBeachUmbrella(ctx, w * 0.76, seaBottom + (h - seaBottom) * 0.32, 0.8, t);
            drawHouse(ctx, w * 0.22, seaBottom + (h - seaBottom) * 0.62, 0.85, t, { wall: '#f5e6ca', roof: '#4fc3f7', trim: '#e8d5b5', flowers: true,
                lights: false });

            // Update and draw blobs
            blobs.forEach(b => {
                updateBlob(b, w, h, t, 0.9);
                drawWalkingBlob(ctx, b, t);
            });
        }

        function drawBeachUmbrella(ctx, x, y, s, t) {
            ctx.save();
            ctx.translate(x, y);
            const sway = Math.sin(t * 0.02) * 0.03;
            ctx.rotate(sway);

            ctx.fillStyle = 'rgba(0,0,0,0.12)';
            ctx.beginPath();
            ctx.ellipse(4 * s, 34 * s, 20 * s, 6 * s, 0, 0, Math.PI * 2);
            ctx.fill();

            ctx.strokeStyle = '#8d6e63';
            ctx.lineWidth = 3 * s;
            ctx.beginPath();
            ctx.moveTo(0, -30 * s);
            ctx.lineTo(0, 32 * s);
            ctx.stroke();

            const segColors = ['#e53935', '#fff', '#42a5f5', '#fff', '#e53935', '#fff'];
            const segCount = segColors.length;
            const radius = 34 * s;
            for (let i = 0; i < segCount; i++) {
                const a0 = Math.PI + (i / segCount) * Math.PI;
                const a1 = Math.PI + ((i + 1) / segCount) * Math.PI;
                ctx.fillStyle = segColors[i];
                ctx.beginPath();
                ctx.moveTo(0, -30 * s);
                ctx.arc(0, -30 * s, radius, a0, a1);
                ctx.closePath();
                ctx.fill();
            }
            ctx.fillStyle = '#fff';
            for (let i = 0; i <= segCount; i++) {
                const a = Math.PI + (i / segCount) * Math.PI;
                const ex = Math.cos(a) * radius;
                const ey = -30 * s + Math.sin(a) * radius;
                ctx.beginPath();
                ctx.arc(ex, ey, 3 * s, 0, Math.PI * 2);
                ctx.fill();
            }

            ctx.fillStyle = '#ff8a65';
            ctx.fillRect(-16 * s, 24 * s, 32 * s, 10 * s);
            ctx.fillStyle = '#fff';
            for (let i = -1; i <= 1; i++) {
                ctx.fillRect(-16 * s + (i + 1) * 10 * s, 24 * s, 3 * s, 10 * s);
            }

            ctx.restore();
        }

        // ── WINTER — snowy scene, NO beach ──
        function drawWinter(ctx, w, h, t, blobs) {
            // Deep winter sky
            const sky = ctx.createLinearGradient(0, 0, 0, h);
            sky.addColorStop(0, '#0b1a2e');
            sky.addColorStop(0.3, '#1a2a4a');
            sky.addColorStop(0.6, '#2d4a6a');
            sky.addColorStop(1, '#4a6a8a');
            ctx.fillStyle = sky;
            ctx.fillRect(0, 0, w, h);

            // Stars
            for (let i = 0; i < 28; i++) {
                const x = (i * 37 + 13) % w;
                const y = (i * 29 + 7) % (h * 0.5);
                const tw = 0.3 + Math.abs(Math.sin(t * 0.015 + i * 1.3)) * 0.7;
                ctx.fillStyle = `rgba(255,255,255,${tw})`;
                ctx.beginPath();
                ctx.arc(x, y, 0.8 + tw * 0.6, 0, Math.PI * 2);
                ctx.fill();
            }

            // Moon
            const moonX = w * 0.85,
                moonY = h * 0.12;
            const moonGlow = ctx.createRadialGradient(moonX, moonY, 0, moonX, moonY, 50);
            moonGlow.addColorStop(0, 'rgba(255,245,220,0.9)');
            moonGlow.addColorStop(0.5, 'rgba(255,245,220,0.3)');
            moonGlow.addColorStop(1, 'rgba(255,245,220,0)');
            ctx.fillStyle = moonGlow;
            ctx.beginPath();
            ctx.arc(moonX, moonY, 50, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#f5edd6';
            ctx.beginPath();
            ctx.arc(moonX, moonY, 16, 0, Math.PI * 2);
            ctx.fill();
            // moon crater details
            ctx.fillStyle = 'rgba(200,190,170,0.25)';
            ctx.beginPath();
            ctx.arc(moonX - 5, moonY - 4, 3, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(moonX + 6, moonY + 3, 4, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(moonX + 2, moonY - 7, 2, 0, Math.PI * 2);
            ctx.fill();

            // Snow-covered ground
            const groundY = h * 0.70;
            ctx.fillStyle = '#e8edf2';
            ctx.beginPath();
            ctx.moveTo(0, groundY);
            for (let x = 0; x <= w; x += 6) {
                const yOff = Math.sin(x * 0.04 + t * 0.008) * 3 + Math.sin(x * 0.07 + t * 0.015) * 1.5;
                ctx.lineTo(x, groundY + yOff);
            }
            ctx.lineTo(w, h);
            ctx.lineTo(0, h);
            ctx.closePath();
            ctx.fill();

            // Snow mounds
            for (let i = 0; i < 5; i++) {
                const mx = (i * 73 + 29) % w;
                const my = groundY + 4 + Math.sin(i * 1.7 + t * 0.01) * 3;
                const mr = 18 + Math.sin(i * 2.3) * 8;
                ctx.fillStyle = 'rgba(255,255,255,0.5)';
                ctx.beginPath();
                ctx.ellipse(mx, my, mr, 6, 0, 0, Math.PI * 2);
                ctx.fill();
            }

            // Snowman
            drawSnowman(ctx, w * 0.72, groundY + 4, 0.6, t);

            // House with snow on roof
            drawHouse(ctx, w * 0.22, groundY + 6, 0.85, t, { wall: '#d5c8b0', roof: '#6d4c2f', trim: '#c9b89a', snow: true,
                lights: true, smoke: true });

            // Snowy pine tree
            drawSnowyTree(ctx, w * 0.55, groundY + 4, 0.7, t);

            // Falling snow
            for (let i = 0; i < 40; i++) {
                const sx = (i * 53 + 17 * Math.sin(i * 0.7)) % (w + 20) - 10;
                const sy = (i * 31 + t * 0.8 * (0.5 + Math.sin(i) * 0.5)) % (groundY + 10);
                const sr = 1.2 + Math.sin(i * 1.3 + t * 0.02) * 0.6;
                const alpha = 0.5 + Math.sin(i * 0.9 + t * 0.01) * 0.3;
                ctx.fillStyle = `rgba(255,255,255,${alpha})`;
                ctx.beginPath();
                ctx.arc(sx, sy, sr, 0, Math.PI * 2);
                ctx.fill();
            }

            blobs.forEach(b => {
                // Make blobs move slower in snow
                updateBlob(b, w, h, t, 0.6);
                drawWalkingBlob(ctx, b, t);
            });
        }

        function drawSnowyTree(ctx, x, y, s, t) {
            ctx.save();
            ctx.translate(x, y);

            // shadow
            ctx.fillStyle = 'rgba(0,0,0,0.08)';
            ctx.beginPath();
            ctx.ellipse(2 * s, 6 * s, 22 * s, 6 * s, 0, 0, Math.PI * 2);
            ctx.fill();

            // trunk
            ctx.fillStyle = '#5d4037';
            ctx.fillRect(-3 * s, -6 * s, 6 * s, 14 * s);

            // pine tiers with snow caps
            const tiers = [
                { w: 44, h: 24, y: -8 },
                { w: 34, h: 22, y: -28 },
                { w: 24, h: 20, y: -46 }
            ];
            tiers.forEach((tier, idx) => {
                // tree green
                ctx.fillStyle = '#2e5a3a';
                ctx.beginPath();
                ctx.moveTo(0, (tier.y - tier.h) * s);
                ctx.lineTo(-tier.w / 2 * s, tier.y * s);
                ctx.lineTo(tier.w / 2 * s, tier.y * s);
                ctx.closePath();
                ctx.fill();

                // snow on branches (white cap)
                ctx.fillStyle = 'rgba(255,255,255,0.85)';
                ctx.beginPath();
                ctx.moveTo(0, (tier.y - tier.h * 0.85) * s);
                const halfW = tier.w / 2 * s * 0.7;
                ctx.quadraticCurveTo(-halfW, (tier.y - tier.h * 0.4) * s, -tier.w / 2 * s * 0.8, (tier.y - tier.h * 0.2) * s);
                ctx.quadraticCurveTo(0, (tier.y - tier.h * 0.1) * s, tier.w / 2 * s * 0.8, (tier.y - tier.h * 0.2) * s);
                ctx.quadraticCurveTo(halfW, (tier.y - tier.h * 0.4) * s, 0, (tier.y - tier.h * 0.85) * s);
                ctx.closePath();
                ctx.fill();
            });

            // star on top
            ctx.fillStyle = '#ffd54f';
            ctx.shadowColor = 'rgba(255,213,79,0.6)';
            ctx.shadowBlur = 8 * s;
            drawStarShape(ctx, 0, -58 * s, 5 * s, 5);
            ctx.shadowBlur = 0;

            ctx.restore();
        }

        function drawSnowman(ctx, x, y, s, t) {
            ctx.save();
            ctx.translate(x, y);

            const wobble = Math.sin(t * 0.015) * 1.2;

            // shadow
            ctx.fillStyle = 'rgba(0,0,0,0.08)';
            ctx.beginPath();
            ctx.ellipse(0, 38 * s, 24 * s, 6 * s, 0, 0, Math.PI * 2);
            ctx.fill();

            // bottom ball
            ctx.fillStyle = '#f0f4f8';
            ctx.shadowColor = 'rgba(0,0,0,0.08)';
            ctx.shadowBlur = 6 * s;
            ctx.shadowOffsetY = 2 * s;
            ctx.beginPath();
            ctx.arc(0, 24 * s + wobble * 0.3, 22 * s, 0, Math.PI * 2);
            ctx.fill();

            // middle ball
            ctx.beginPath();
            ctx.arc(0, 4 * s + wobble * 0.5, 16 * s, 0, Math.PI * 2);
            ctx.fill();

            // head
            ctx.beginPath();
            ctx.arc(0, -16 * s + wobble * 0.7, 11 * s, 0, Math.PI * 2);
            ctx.fill();

            ctx.shadowBlur = 0;

            // hat
            ctx.fillStyle = '#37474f';
            ctx.fillRect(-16 * s, -26 * s, 32 * s, 5 * s);
            ctx.fillRect(-10 * s, -38 * s, 20 * s, 14 * s);

            // scarf
            ctx.fillStyle = '#e53935';
            ctx.fillRect(-18 * s, -6 * s + wobble * 0.4, 36 * s, 5 * s);
            ctx.fillRect(-16 * s, -4 * s + wobble * 0.4, 6 * s, 10 * s);

            // eyes (coal)
            ctx.fillStyle = '#1a1a1a';
            ctx.beginPath();
            ctx.arc(-5 * s, -18 * s + wobble * 0.6, 2 * s, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(5 * s, -18 * s + wobble * 0.6, 2 * s, 0, Math.PI * 2);
            ctx.fill();

            // carrot nose
            ctx.fillStyle = '#ff8a65';
            ctx.beginPath();
            ctx.moveTo(0, -14 * s + wobble * 0.6);
            ctx.lineTo(12 * s, -15 * s + wobble * 0.5);
            ctx.lineTo(0, -16 * s + wobble * 0.5);
            ctx.closePath();
            ctx.fill();

            // smile (coal)
            ctx.strokeStyle = '#1a1a1a';
            ctx.lineWidth = 1.5 * s;
            ctx.beginPath();
            ctx.arc(0, -12 * s + wobble * 0.5, 6 * s, 0.1 * Math.PI, 0.9 * Math.PI);
            ctx.stroke();

            // buttons (coal)
            ctx.fillStyle = '#1a1a1a';
            for (let i = -1; i <= 1; i++) {
                ctx.beginPath();
                ctx.arc(0, (2 + i * 6) * s + wobble * 0.4, 1.8 * s, 0, Math.PI * 2);
                ctx.fill();
            }

            ctx.restore();
        }

        // ── AUTUMN — greeny with maple tree fading ──
        function drawAutumn(ctx, w, h, t, blobs) {
            const sky = ctx.createLinearGradient(0, 0, 0, h);
            sky.addColorStop(0, '#9bb7d4');
            sky.addColorStop(0.5, '#c9d9e8');
            sky.addColorStop(1, '#e8f0e8');
            ctx.fillStyle = sky;
            ctx.fillRect(0, 0, w, h);

            // Green grassy ground (greeny)
            const grd = ctx.createLinearGradient(0, h * 0.74, 0, h);
            grd.addColorStop(0, '#7cb342');
            grd.addColorStop(1, '#558b2f');
            ctx.fillStyle = grd;
            ctx.fillRect(0, h * 0.74, w, h * 0.26);

            // Grass blades
            for (let i = 0; i < 60; i++) {
                const gx = (i * 19 + 7) % w;
                const gy = h * 0.74 + 2 + (i * 7) % 18;
                ctx.strokeStyle = `rgba(100,160,60,${0.3 + Math.sin(i * 0.7) * 0.2})`;
                ctx.lineWidth = 1.2;
                ctx.beginPath();
                ctx.moveTo(gx, gy);
                ctx.lineTo(gx + Math.sin(i * 1.3 + t * 0.01) * 2, gy - 4 - Math.sin(i * 0.9) * 2);
                ctx.stroke();
            }

            // Maple tree (fading autumn colors)
            drawTree(ctx, w * 0.78, h * 0.74, 1.0, t, 'maple');

            // House with green surroundings
            drawHouse(ctx, w * 0.22, h * 0.72, 0.9, t, { wall: '#e8d5b5', roof: '#8d6e63', trim: '#d4a373', flowers: true,
                lights: false });

            // Some scattered autumn leaves on the ground
            for (let i = 0; i < 12; i++) {
                const lx = (i * 47 + 23) % w;
                const ly = h * 0.74 + 6 + (i * 13) % 20;
                const ls = 2 + Math.sin(i * 1.1) * 1.2;
                const colors = ['#d4a373', '#b5835a', '#a67c52', '#c97d5a', '#e8a87c', '#8d6e63'];
                ctx.fillStyle = colors[i % colors.length];
                ctx.globalAlpha = 0.6 + Math.sin(i * 0.7) * 0.2;
                ctx.beginPath();
                ctx.ellipse(lx, ly, ls, ls * 0.7, Math.sin(i + t * 0.005) * 0.3, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1;
            }

            blobs.forEach(b => {
                updateBlob(b, w, h, t, 0.85);
                drawWalkingBlob(ctx, b, t);
            });
        }

        // ── SPRING — greeny with flowers and sakura ──
        function drawSpring(ctx, w, h, t, blobs) {
            const sky = ctx.createLinearGradient(0, 0, 0, h);
            sky.addColorStop(0, '#81c784');
            sky.addColorStop(0.5, '#b2dfdb');
            sky.addColorStop(1, '#e0f7fa');
            ctx.fillStyle = sky;
            ctx.fillRect(0, 0, w, h);

            const grd = ctx.createLinearGradient(0, h * 0.73, 0, h);
            grd.addColorStop(0, '#7cb342');
            grd.addColorStop(1, '#4caf50');
            ctx.fillStyle = grd;
            ctx.fillRect(0, h * 0.73, w, h * 0.27);

            // Flowers in the grass
            for (let i = 0; i < 30; i++) {
                const fx = (i * 41 + t * 0.1) % (w + 20) - 10;
                const fy = h * 0.73 + 4 + i * 4 + Math.sin(i * 2.1 + t * 0.02) * 3;
                const colors = ['#e91e63', '#f06292', '#ce93d8', '#ba68c8', '#4dd0e1', '#81c784', '#ffeb3b', '#ff5722'];
                ctx.fillStyle = colors[i % colors.length];
                const fr = 2 + Math.sin(i * 1.5 + t * 0.02) * 1.2;
                ctx.beginPath();
                ctx.arc(fx, fy, fr, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#388e3c';
                ctx.fillRect(fx - 0.5, fy + fr, 1, fr * 1.5);
            }

            // Sakura tree
            drawTree(ctx, w * 0.78, h * 0.725, 1.0, t, 'sakura');

            drawHouse(ctx, w * 0.22, h * 0.71, 0.9, t, { wall: '#f5e6ca', roof: '#6d4c2f', trim: '#d7ccc8', flowers: true,
                lights: false });

            blobs.forEach(b => {
                updateBlob(b, w, h, t, 1.0);
                drawWalkingBlob(ctx, b, t);
            });
        }

        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        //  TREE DRAWING — maple (autumn) & sakura (spring)
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        function drawTree(ctx, x, y, s, t, type) {
            ctx.save();
            ctx.translate(x, y);

            const sway = Math.sin(t * 0.012) * 0.035;
            ctx.rotate(sway);

            // ── ground shadow ──
            ctx.shadowColor = 'rgba(0,0,0,0.15)';
            ctx.shadowBlur = 14 * s;
            ctx.shadowOffsetY = 4 * s;
            ctx.fillStyle = 'rgba(0,0,0,0.12)';
            ctx.beginPath();
            ctx.ellipse(0, 4 * s, 26 * s, 8 * s, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;
            ctx.shadowOffsetY = 0;

            // ── trunk ──
            const trunkH = 42 * s;
            ctx.strokeStyle = '#6d4c2f';
            ctx.lineWidth = 7 * s;
            ctx.lineCap = 'round';
            ctx.beginPath();
            ctx.moveTo(0, 4 * s);
            ctx.lineTo(-2 * s, -trunkH);
            ctx.stroke();

            // ── branches ──
            ctx.lineWidth = 4 * s;
            ctx.beginPath();
            ctx.moveTo(-1 * s, -trunkH * 0.55);
            ctx.quadraticCurveTo(-16 * s, -trunkH * 0.7, -20 * s, -trunkH * 0.95);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(-1.5 * s, -trunkH * 0.8);
            ctx.quadraticCurveTo(14 * s, -trunkH * 0.92, 20 * s, -trunkH * 1.1);
            ctx.stroke();

            // ── foliage colors ──
            let colors, highlight;
            if (type === 'maple') {
                colors = ['#b23b3b', '#d84315', '#e64a19', '#a0392f', '#c62828'];
                highlight = 'rgba(255,200,150,0.18)';
            } else {
                // sakura
                colors = ['#f8bbd0', '#f48fb1', '#fce4ec', '#f06292', '#f5c1d9'];
                highlight = 'rgba(255,255,255,0.35)';
            }

            // ── canopy: layered soft blobs ──
            const canopyY = -trunkH - 6 * s;
            const clusters = [
                { dx: 0, dy: -8, r: 24 },
                { dx: -20, dy: 2, r: 17 },
                { dx: 20, dy: 0, r: 18 },
                { dx: -10, dy: 14, r: 15 },
                { dx: 12, dy: 15, r: 15 },
                { dx: 0, dy: 6, r: 20 }
            ];

            clusters.forEach((c, i) => {
                const wob = Math.sin(t * 0.01 + i * 1.7) * 1.2 * s;
                ctx.fillStyle = colors[i % colors.length];
                ctx.shadowColor = 'rgba(0,0,0,0.10)';
                ctx.shadowBlur = 6 * s;
                ctx.shadowOffsetY = 2 * s;
                ctx.beginPath();
                ctx.arc(c.dx * s + wob, canopyY + c.dy * s, c.r * s, 0, Math.PI * 2);
                ctx.fill();
            });

            // ── soft highlight ──
            ctx.shadowBlur = 0;
            ctx.fillStyle = highlight;
            ctx.beginPath();
            ctx.arc(-8 * s, canopyY - 10 * s, 14 * s, 0, Math.PI * 2);
            ctx.fill();

            ctx.restore();

            // ── falling particles (leaves / petals) ──
            const particleCount = type === 'maple' ? 12 : 18;
            for (let i = 0; i < particleCount; i++) {
                const seed = i * 13.7;
                const fallT = (t * 0.02 + seed) % 40;
                const px = x + Math.sin(seed) * 34 * s + Math.sin(t * 0.006 + seed) * 10 * s;
                const py = y - trunkH * 0.6 + (fallT / 40) * (trunkH * 1.15);
                const drift = Math.sin(t * 0.03 + seed * 2) * 6 * s;
                const alpha = Math.max(0, 1 - fallT / 40);
                if (alpha <= 0) continue;

                ctx.save();
                ctx.translate(px + drift, py);
                ctx.rotate(t * 0.02 + seed);
                ctx.globalAlpha = alpha * 0.85;
                ctx.fillStyle = colors[i % colors.length];
                if (type === 'maple') {
                    ctx.beginPath();
                    ctx.ellipse(0, 0, 2.6 * s, 1.6 * s, 0, 0, Math.PI * 2);
                    ctx.fill();
                } else {
                    ctx.beginPath();
                    ctx.ellipse(0, 0, 2 * s, 1.3 * s, 0, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.ellipse(0, -1.6 * s, 1.6 * s, 1 * s, 0, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.restore();
            }
        }

        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        //  HOUSE DRAWING
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        function drawHouse(ctx, x, y, s, t, opts = {}) {
            const wall = opts.wall || '#f5e6ca';
            const roof = opts.roof || '#b23b3b';
            const trim = opts.trim || '#e8d5b5';
            const hasSnow = opts.snow || false;
            const hasLights = opts.lights || false;
            const chimneySmoke = opts.smoke || false;

            ctx.save();
            ctx.translate(x, y);

            const W = 58 * s,
                H = 48 * s;
            const hw = W / 2,
                hh = H / 2;

            ctx.shadowColor = 'rgba(0,0,0,0.15)';
            ctx.shadowBlur = 16 * s;
            ctx.shadowOffsetY = 4 * s;

            ctx.fillStyle = wall;
            ctx.shadowColor = 'rgba(0,0,0,0.10)';
            ctx.shadowBlur = 12 * s;
            ctx.shadowOffsetY = 3 * s;
            ctx.beginPath();
            ctx.roundRect(-hw, -hh + 4 * s, W, H - 4 * s, 2 * s);
            ctx.fill();

            ctx.shadowBlur = 0;
            ctx.shadowOffsetY = 0;
            ctx.strokeStyle = 'rgba(0,0,0,0.04)';
            ctx.lineWidth = 0.5;
            for (let row = 0; row < 4; row++) {
                for (let col = -1; col < 2; col++) {
                    const bx = col * 14 * s + (row % 2) * 7 * s;
                    const by = -hh + 8 * s + row * 10 * s;
                    ctx.strokeRect(bx, by, 13 * s, 9 * s);
                }
            }

            ctx.shadowColor = 'rgba(0,0,0,0.15)';
            ctx.shadowBlur = 10 * s;
            ctx.shadowOffsetY = 4 * s;
            ctx.fillStyle = roof;
            ctx.beginPath();
            ctx.moveTo(-hw - 10 * s, -hh + 4 * s);
            ctx.lineTo(0, -hh - 22 * s);
            ctx.lineTo(hw + 10 * s, -hh + 4 * s);
            ctx.closePath();
            ctx.fill();

            ctx.shadowBlur = 6 * s;
            ctx.fillStyle = trim;
            ctx.beginPath();
            ctx.moveTo(-hw - 11 * s, -hh + 6 * s);
            ctx.lineTo(-hw - 6 * s, -hh + 2 * s);
            ctx.lineTo(hw + 6 * s, -hh + 2 * s);
            ctx.lineTo(hw + 11 * s, -hh + 6 * s);
            ctx.closePath();
            ctx.fill();

            ctx.shadowBlur = 0;
            ctx.strokeStyle = 'rgba(0,0,0,0.10)';
            ctx.lineWidth = 1.5 * s;
            ctx.setLineDash([4 * s, 6 * s]);
            for (let i = 0; i < 5; i++) {
                const yy = -hh + 4 * s - i * 5 * s;
                const xx = (yy + hh - 4 * s) * 0.85;
                ctx.beginPath();
                ctx.moveTo(-xx, yy);
                ctx.lineTo(xx, yy);
                ctx.stroke();
            }
            ctx.setLineDash([]);

            ctx.shadowBlur = 6 * s;
            ctx.shadowOffsetY = 2 * s;
            ctx.fillStyle = '#8a6a52';
            ctx.beginPath();
            ctx.roundRect(hw - 10 * s, -hh - 18 * s, 7 * s, 16 * s, 1 * s);
            ctx.fill();
            ctx.fillStyle = '#7a5a42';
            ctx.fillRect(hw - 11 * s, -hh - 20 * s, 9 * s, 3 * s);

            if (chimneySmoke) {
                ctx.shadowBlur = 0;
                for (let i = 0; i < 4; i++) {
                    const st = t * 0.02 + i * 1.7;
                    const sx = hw - 6 * s + Math.sin(st) * 5 * s;
                    const sy = -hh - 22 * s - i * 7 * s - (t * 0.01) % 6 * s;
                    const sr = 3 * s + i * 2.5 * s + Math.sin(st * 0.5) * 2 * s;
                    const alpha = 0.25 - i * 0.05;
                    ctx.fillStyle = `rgba(200,200,200,${Math.max(0, alpha)})`;
                    ctx.beginPath();
                    ctx.arc(sx, sy, sr, 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            ctx.shadowBlur = 4 * s;
            ctx.shadowOffsetY = 2 * s;
            ctx.fillStyle = '#6d4c2f';
            ctx.beginPath();
            ctx.roundRect(-5 * s, -hh + 18 * s, 10 * s, 18 * s, 1.5 * s);
            ctx.fill();
            ctx.fillStyle = '#5a3d2b';
            ctx.fillRect(-4 * s, -hh + 20 * s, 3.5 * s, 6 * s);
            ctx.fillRect(0.5 * s, -hh + 20 * s, 3.5 * s, 6 * s);
            ctx.fillRect(-4 * s, -hh + 28 * s, 3.5 * s, 6 * s);
            ctx.fillRect(0.5 * s, -hh + 28 * s, 3.5 * s, 6 * s);
            ctx.fillStyle = '#f0c040';
            ctx.shadowBlur = 0;
            ctx.beginPath();
            ctx.arc(4 * s, -hh + 25 * s, 1.2 * s, 0, Math.PI * 2);
            ctx.fill();

            ctx.shadowBlur = 4 * s;
            ctx.shadowOffsetY = 2 * s;
            const winColor = hasLights ? '#ffdd77' : '#b3d9ff';
            ctx.fillStyle = winColor;
            ctx.beginPath();
            ctx.roundRect(-hw + 6 * s, -hh + 12 * s, 11 * s, 12 * s, 1 * s);
            ctx.fill();
            ctx.strokeStyle = 'rgba(0,0,0,0.20)';
            ctx.lineWidth = 1.5 * s;
            ctx.strokeRect(-hw + 6 * s, -hh + 12 * s, 11 * s, 12 * s);
            ctx.beginPath();
            ctx.moveTo(-hw + 6 * s, -hh + 18 * s);
            ctx.lineTo(-hw + 17 * s, -hh + 18 * s);
            ctx.moveTo(-hw + 11.5 * s, -hh + 12 * s);
            ctx.lineTo(-hw + 11.5 * s, -hh + 24 * s);
            ctx.stroke();
            ctx.fillStyle = winColor;
            ctx.beginPath();
            ctx.roundRect(hw - 17 * s, -hh + 12 * s, 11 * s, 12 * s, 1 * s);
            ctx.fill();
            ctx.strokeStyle = 'rgba(0,0,0,0.20)';
            ctx.lineWidth = 1.5 * s;
            ctx.strokeRect(hw - 17 * s, -hh + 12 * s, 11 * s, 12 * s);
            ctx.beginPath();
            ctx.moveTo(hw - 17 * s, -hh + 18 * s);
            ctx.lineTo(hw - 6 * s, -hh + 18 * s);
            ctx.moveTo(hw - 11.5 * s, -hh + 12 * s);
            ctx.lineTo(hw - 11.5 * s, -hh + 24 * s);
            ctx.stroke();

            if (hasLights) {
                ctx.shadowBlur = 0;
                const glow = ctx.createRadialGradient(x, y - hh + 18 * s, 0, x, y - hh + 18 * s, 20 * s);
                glow.addColorStop(0, 'rgba(255,220,100,0.15)');
                glow.addColorStop(1, 'rgba(255,220,100,0)');
                ctx.fillStyle = glow;
                ctx.beginPath();
                ctx.arc(x, y - hh + 18 * s, 20 * s, 0, Math.PI * 2);
                ctx.fill();
            }

            ctx.shadowBlur = 0;
            ctx.fillStyle = '#c9b89a';
            ctx.fillRect(-7 * s, -hh + 36 * s, 14 * s, 2 * s);
            ctx.fillRect(-6 * s, -hh + 38 * s, 12 * s, 2 * s);

            if (hasSnow) {
                ctx.shadowBlur = 0;
                ctx.fillStyle = 'rgba(255,255,255,0.85)';
                ctx.beginPath();
                ctx.moveTo(-hw - 8 * s, -hh + 5 * s);
                ctx.quadraticCurveTo(-hw * 0.4, -hh - 16 * s, 0, -hh - 20 * s);
                ctx.quadraticCurveTo(hw * 0.4, -hh - 16 * s, hw + 8 * s, -hh + 5 * s);
                ctx.quadraticCurveTo(hw * 0.6, -hh + 2 * s, 0, -hh + 4 * s);
                ctx.quadraticCurveTo(-hw * 0.6, -hh + 2 * s, -hw - 8 * s, -hh + 5 * s);
                ctx.closePath();
                ctx.fill();
                ctx.fillStyle = 'rgba(255,255,255,0.8)';
                ctx.beginPath();
                ctx.ellipse(hw - 6.5 * s, -hh - 20 * s, 6 * s, 2.5 * s, 0, 0, Math.PI * 2);
                ctx.fill();
            }

            if (opts.flowers) {
                ctx.shadowBlur = 0;
                const flowerColors = ['#e91e63', '#ff5722', '#ffeb3b', '#4caf50', '#9c27b0'];
                for (let side = -1; side <= 1; side += 2) {
                    const bx = side * (hw - 14 * s);
                    ctx.fillStyle = '#6d4c2f';
                    ctx.fillRect(bx - 3 * s, -hh + 10 * s, 6 * s, 3 * s);
                    for (let f = 0; f < 3; f++) {
                        const fx = bx + (f - 1) * 2 * s + Math.sin(t * 0.02 + f + side) * 0.3 * s;
                        const fy = -hh + 8 * s + Math.sin(t * 0.025 + f * 1.2 + side) * 0.5 * s;
                        ctx.fillStyle = flowerColors[(f + side) % flowerColors.length];
                        ctx.beginPath();
                        ctx.arc(fx, fy, 1.8 * s, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.fillStyle = '#4caf50';
                        ctx.fillRect(fx - 0.3 * s, fy + 1.5 * s, 0.6 * s, 2 * s);
                    }
                }
            }

            ctx.restore();
        }

        function drawStarShape(ctx, cx, cy, r, points) {
            ctx.beginPath();
            for (let i = 0; i < points * 2; i++) {
                const rad = i % 2 === 0 ? r : r * 0.45;
                const angle = (Math.PI / points) * i - Math.PI / 2;
                const px = cx + Math.cos(angle) * rad;
                const py = cy + Math.sin(angle) * rad;
                if (i === 0) ctx.moveTo(px, py);
                else ctx.lineTo(px, py);
            }
            ctx.closePath();
            ctx.fill();
        }

        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        //  RENDER SCENE
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        function renderScene(ctx, w, h, season, time) {
            ctx.clearRect(0, 0, w, h);

            if (blobInstances.length === 0) {
                const blobConfigs = [
                    { x: w * 0.68, y: h * 0.72, emoji: '🌻', color: '#ffb74d', speed: 1.0, size: 22 },
                    { x: w * 0.12, y: h * 0.78, emoji: '🐸', color: '#a5d6a7', speed: 0.8, size: 18 },
                    { x: w * 0.45, y: h * 0.76, emoji: '🐝', color: '#fdd835', speed: 1.2, size: 16 },
                ];
                blobInstances = blobConfigs.map(cfg => createBlob(cfg.x, cfg.y, cfg.emoji, cfg.color, cfg.speed, cfg
                .size));
                const drinkerIdx = Math.floor(Math.random() * blobInstances.length);
                blobInstances[drinkerIdx].hasDrink = true;
                blobInstances[drinkerIdx].drinkCooldown = 60 + Math.random() * 120;
                blobInstances.forEach((b, i) => {
                    b.x = 30 + Math.random() * (w - 60);
                    b.baseY = h * 0.70 + Math.random() * 0.12 * h;
                    b.y = b.baseY;
                });
            }

            blobInstances.forEach(b => {
                if (Math.abs(b.baseY - h * 0.73) > 20) {
                    b.baseY = h * 0.70 + (b.baseY % (h * 0.12));
                    b.y = b.baseY;
                }
            });

            switch (season) {
                case 'summer':
                    drawSummer(ctx, w, h, time, blobInstances);
                    break;
                case 'winter':
                    drawWinter(ctx, w, h, time, blobInstances);
                    break;
                case 'autumn':
                    drawAutumn(ctx, w, h, time, blobInstances);
                    break;
                case 'spring':
                    drawSpring(ctx, w, h, time, blobInstances);
                    break;
                default:
                    drawSummer(ctx, w, h, time, blobInstances);
            }
        }

        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        //  ANIMATION LOOP
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        function animateScene(canvas, season) {
            if (canvasAnimId) cancelAnimationFrame(canvasAnimId);
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            let { w, h } = sizeCanvas(canvas);
            const toastObj = activeToast;
            const onResize = () => {
                if (canvas && document.body.contains(canvas)) {
                    ({ w, h } = sizeCanvas(canvas));
                    blobInstances.forEach(b => {
                        b.baseY = h * 0.70 + (b.baseY % (h * 0.12));
                        b.y = b.baseY;
                    });
                }
            };
            window.addEventListener('resize', onResize);
            if (toastObj) toastObj._resizeHandler = onResize;

            let start = performance.now();

            function frame(now) {
                if (!canvas || !document.body.contains(canvas)) {
                    cancelAnimationFrame(canvasAnimId);
                    window.removeEventListener('resize', onResize);
                    return;
                }
                const t = (now - start) * 0.6;
                renderScene(ctx, w, h, season, t);
                canvasAnimId = requestAnimationFrame(frame);
            }
            frame(start);
            activeSeason = season;
        }

        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        //  LOCATION & WEATHER
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        async function getLocationFromIP() {
            try {
                const res = await fetch('https://ip-api.com/json/');
                if (!res.ok) throw new Error('IP API error');
                const data = await res.json();
                if (data.status === 'success') {
                    return {
                        city: data.city || 'Unknown',
                        country: data.country || 'Unknown',
                        countryCode: data.countryCode || '',
                        lat: data.lat || 0,
                        lon: data.lon || 0,
                        region: data.regionName || '',
                        timezone: data.timezone || null
                    };
                }
                return null;
            } catch (e) {
                console.warn('IP geolocation failed:', e);
                return null;
            }
        }

        function getFlagFromCode(code) {
            if (!code) return '🌍';
            const upper = code.toUpperCase();
            if (upper.length === 2) {
                try {
                    return String.fromCodePoint(0x1F1E6 + upper.charCodeAt(0) - 65, 0x1F1E6 + upper.charCodeAt(1) - 65);
                } catch (e) { return '🌍'; }
            }
            return '🌍';
        }

        function getSeasonForCountry(country, code, lat) {
            const month = new Date().getMonth() + 1;
            let effectiveLat = lat;
            if (!effectiveLat || Math.abs(effectiveLat) < 0.01) {
                if (code && countryLatMap[code]) {
                    effectiveLat = countryLatMap[code];
                } else {
                    effectiveLat = 30;
                }
            }
            const isNorth = effectiveLat > 0;
            if (Math.abs(effectiveLat) < 10) {
                if (month >= 11 || month <= 2) return 'winter';
                if (month >= 3 && month <= 5) return 'spring';
                if (month >= 6 && month <= 8) return 'summer';
                return 'autumn';
            }
            if (isNorth) {
                if (month >= 3 && month <= 5) return 'spring';
                if (month >= 6 && month <= 8) return 'summer';
                if (month >= 9 && month <= 11) return 'autumn';
                return 'winter';
            } else {
                if (month >= 3 && month <= 5) return 'autumn';
                if (month >= 6 && month <= 8) return 'winter';
                if (month >= 9 && month <= 11) return 'spring';
                return 'summer';
            }
        }

        function weatherEmojiFromCode(code) {
            if (code === 0) return '☀️';
            if (code >= 1 && code <= 3) return '⛅';
            if (code === 45 || code === 48) return '🌫️';
            if (code >= 51 && code <= 67) return '🌧️';
            if (code >= 71 && code <= 77) return '❄️';
            if (code >= 80 && code <= 82) return '🌧️';
            if (code >= 85 && code <= 86) return '❄️';
            if (code >= 95) return '⛈️';
            return '🌤️';
        }

        function weatherDescFromCode(code) {
            const map = {
                0: 'Clear sky', 1: 'Mainly clear', 2: 'Partly cloudy', 3: 'Overcast',
                45: 'Fog', 48: 'Rime fog',
                51: 'Light drizzle', 53: 'Drizzle', 55: 'Dense drizzle',
                56: 'Freezing drizzle', 57: 'Freezing drizzle',
                61: 'Slight rain', 63: 'Rain', 65: 'Heavy rain',
                66: 'Freezing rain', 67: 'Freezing rain',
                71: 'Slight snow', 73: 'Snow', 75: 'Heavy snow', 77: 'Snow grains',
                80: 'Rain showers', 81: 'Rain showers', 82: 'Violent showers',
                85: 'Snow showers', 86: 'Snow showers',
                95: 'Thunderstorm', 96: 'Thunderstorm', 99: 'Thunderstorm'
            };
            return map[code] || '--';
        }

        async function fetchWeather(lat, lon) {
            try {
                const url =
                    `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,weather_code&timezone=auto`;
                const res = await fetch(url);
                if (!res.ok) throw new Error('Weather API error');
                const data = await res.json();
                const current = data.current || {};
                const tempC = typeof current.temperature_2m === 'number' ? current.temperature_2m : null;
                const code = current.weather_code;
                return {
                    tempC,
                    condition: weatherDescFromCode(code),
                    emoji: weatherEmojiFromCode(code),
                    region: '',
                    city: '',
                    country: '',
                    lat,
                    lon,
                    timezone: data.timezone || null
                };
            } catch (err) {
                return null;
            }
        }

        async function fetchWeatherByCity(city) {
            try {
                const geoUrl =
                    `https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(city)}&count=1&language=en&format=json`;
                const geoRes = await fetch(geoUrl);
                if (!geoRes.ok) throw new Error('Geocoding error');
                const geoData = await geoRes.json();
                const place = geoData.results?.[0];
                if (!place) return null;

                const lat = place.latitude,
                    lon = place.longitude;
                const wUrl =
                    `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,weather_code&timezone=auto`;
                const wRes = await fetch(wUrl);
                if (!wRes.ok) throw new Error('Weather API error');
                const wData = await wRes.json();
                const current = wData.current || {};
                const tempC = typeof current.temperature_2m === 'number' ? current.temperature_2m : null;
                const code = current.weather_code;

                return {
                    tempC,
                    condition: weatherDescFromCode(code),
                    emoji: weatherEmojiFromCode(code),
                    region: place.admin1 || '',
                    city: place.name || city,
                    country: place.country || '',
                    lat,
                    lon,
                    timezone: wData.timezone || null
                };
            } catch (err) {
                return null;
            }
        }

        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        //  SHOW TOAST
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        async function showSeasonToast(season, city, country, code, region, lat, manual = false) {
            const toast = createToast();
            const canvas = toast.canvas;
            const emoji = season === 'spring' ? '🌸' : season === 'summer' ? '☀️' : season === 'autumn' ? '🍂' : '❄️';
            const name = season.charAt(0).toUpperCase() + season.slice(1);
            const flag = getFlagFromCode(code) || '🌍';
            let locationDisplay = city;
            if (region && region !== city && region !== 'Unknown') {
                locationDisplay += `, ${region}`;
            }
            const mainText = `${flag} ${locationDisplay} · ${country}`;
            const subText = `${emoji} ${name}`;

            toast.update(mainText, subText, emoji, 80);

            if (currentTemp !== null && currentTemp !== undefined) {
                toast.updateWeather(currentTemp, currentCondition || '', currentWeatherEmoji || '🌤️');
                toast.setStatus('✅ Weather loaded');
            } else {
                toast.setStatus('⏳ Loading weather...');
                try {
                    let wData = null;
                    if (city && city !== 'Unknown') {
                        wData = await fetchWeatherByCity(city);
                    }
                    if ((!wData || wData.tempC === null) && lat) {
                        wData = await fetchWeather(lat, 0);
                    }
                    if (wData && wData.tempC !== null) {
                        currentTemp = wData.tempC;
                        currentCondition = wData.condition || '';
                        currentWeatherEmoji = wData.emoji || '🌤️';
                        if (wData.region) currentRegion = wData.region;
                        if (wData.city && wData.city !== 'Unknown') currentCity = wData.city;
                        if (wData.country) currentCountry = wData.country;
                        if (wData.lat) currentLat = wData.lat;
                        if (wData.lon) currentLon = wData.lon;
                        toast.updateWeather(currentTemp, currentCondition, currentWeatherEmoji);
                        toast.setStatus('✅ Weather loaded');
                    } else {
                        toast.setStatus('⚠️ Weather unavailable');
                    }
                } catch (e) {
                    toast.setStatus('⚠️ Weather unavailable');
                }
            }

            blobInstances = [];
            requestAnimationFrame(() => {
                requestAnimationFrame(() => {
                    animateScene(canvas, season);
                });
            });

            if (!manual) {
                if (toastTimer) clearTimeout(toastTimer);
                toastTimer = setTimeout(() => {
                    if (activeToast === toast) toast.close();
                }, 10000);
            }

            updateSeasonIndicator(season);

            if (code) {
                const option = countrySelect.querySelector(`option[value="${code}"]`);
                if (option) countrySelect.value = code;
            }

            return toast;
        }

        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        //  MANUAL SEASON SWITCH
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        function switchToSeason(season) {
            if (activeToast) {
                const canvas = activeToast.canvas;
                blobInstances = [];
                animateScene(canvas, season);
                const emoji = season === 'spring' ? '🌸' : season === 'summer' ? '☀️' : season === 'autumn' ? '🍂' : '❄️';
                const name = season.charAt(0).toUpperCase() + season.slice(1);
                const flag = getFlagFromCode(currentCountryCode) || '🌍';
                let locationDisplay = currentCity;
                if (currentRegion && currentRegion !== currentCity && currentRegion !== 'Unknown') {
                    locationDisplay += `, ${currentRegion}`;
                }
                const mainText = `${flag} ${locationDisplay} · ${currentCountry}`;
                const subText = `${emoji} ${name}`;
                activeToast.update(mainText, subText, emoji, 100);
                if (currentTemp !== null && currentTemp !== undefined) {
                    activeToast.updateWeather(currentTemp, currentCondition || '', currentWeatherEmoji || '🌤️');
                    activeToast.setStatus('✅ Weather loaded');
                }
                updateSeasonIndicator(season);
                activeSeason = season;
                return;
            }
            showSeasonToast(season, currentCity, currentCountry, currentCountryCode, currentRegion, currentLat, true);
        }

        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        //  UPDATE FROM COUNTRY SELECT
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        async function updateFromCountry(code) {
            const country = countryList.find(c => c.code === code);
            if (!country) return;
            const name = country.name;

            const wData = await fetchWeatherByCity(name);

            let city = name;
            let region = '';
            let temp = null,
                cond = '',
                emoji = '🌤️';
            let lat = 0;
            let lon = 0;
            let countryName = name;

            if (wData && wData.tempC !== null) {
                temp = wData.tempC;
                cond = wData.condition || '';
                emoji = wData.emoji || '🌤️';
                if (wData.city && wData.city !== name) city = wData.city;
                if (wData.region) region = wData.region;
                if (wData.country) countryName = wData.country;
                lat = wData.lat || 0;
                lon = wData.lon || 0;
                if (wData.timezone) currentTimezone = wData.timezone;
            }

            if (!lat || Math.abs(lat) < 0.01) {
                lat = countryLatMap[code] || 30;
            }

            currentCity = city;
            currentCountry = countryName;
            currentCountryCode = code;
            currentRegion = region;
            currentTemp = temp;
            currentCondition = cond;
            currentWeatherEmoji = emoji;
            currentFlag = getFlagFromCode(code);
            currentLat = lat;
            currentLon = lon;

            const season = getSeasonForCountry(countryName, code, lat);
            blobInstances = [];
            await showSeasonToast(season, city, countryName, code, region, lat, true);
        }

        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        //  DETECT LOCATION
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        async function detectLocation() {
            let loc = await getLocationFromIP();
            if (loc && loc.countryCode) {
                const code = loc.countryCode;
                const country = countryList.find(c => c.code === code);
                if (country) {
                    currentCountryCode = code;
                    currentCountry = country.name;
                    currentCity = loc.city || country.name;
                    currentRegion = loc.region || '';
                    currentFlag = getFlagFromCode(code);
                    currentLat = loc.lat || 0;
                    currentLon = loc.lon || 0;

                    if (!currentLat || Math.abs(currentLat) < 0.01) {
                        currentLat = countryLatMap[code] || 30;
                    }

                    const wData = await fetchWeather(loc.lat || currentLat, loc.lon || 0);
                    if (wData && wData.tempC !== null) {
                        currentTemp = wData.tempC;
                        currentCondition = wData.condition || '';
                        currentWeatherEmoji = wData.emoji || '🌤️';
                        if (wData.city) currentCity = wData.city;
                        if (wData.region) currentRegion = wData.region;
                        if (wData.lat) currentLat = wData.lat;
                        if (wData.lon) currentLon = wData.lon;
                    }
                    currentTimezone = (wData && wData.timezone) || loc.timezone || currentTimezone;

                    const season = getSeasonForCountry(currentCountry, currentCountryCode, currentLat);
                    blobInstances = [];
                    await showSeasonToast(season, currentCity, currentCountry, currentCountryCode, currentRegion, currentLat,
                        true);
                    return;
                }
            }

            if (navigator.geolocation) {
                try {
                    const pos = await new Promise((resolve, reject) => {
                        navigator.geolocation.getCurrentPosition(resolve, reject, { timeout: 8000 });
                    });
                    const { latitude, longitude } = pos.coords;
                    const wData = await fetchWeather(latitude, longitude);
                    if (wData && wData.tempC !== null) {
                        const city = wData.city || 'Unknown';
                        const country = wData.country || 'Unknown';
                        let code = '';
                        const found = countryList.find(c => c.name === country);
                        if (found) code = found.code;
                        if (!code) {
                            for (const c of countryList) {
                                if (country.toLowerCase().includes(c.name.toLowerCase()) ||
                                    c.name.toLowerCase().includes(country.toLowerCase())) {
                                    code = c.code;
                                    break;
                                }
                            }
                        }
                        currentCity = city;
                        currentCountry = country;
                        currentCountryCode = code;
                        currentRegion = wData.region || '';
                        currentTemp = wData.tempC;
                        currentCondition = wData.condition || '';
                        currentWeatherEmoji = wData.emoji || '🌤️';
                        currentFlag = getFlagFromCode(code);
                        currentLat = wData.lat || latitude;
                        currentLon = wData.lon || longitude;
                        currentTimezone = wData.timezone || currentTimezone;

                        const season = getSeasonForCountry(country, code, currentLat);
                        blobInstances = [];
                        await showSeasonToast(season, city, country, code, currentRegion, currentLat, true);
                        return;
                    }
                } catch (e) {
                    console.warn('Geolocation failed:', e);
                }
            }

            const fallbackCode = 'US';
            await updateFromCountry(fallbackCode);
        }

        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        //  INIT
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        window.addEventListener('DOMContentLoaded', async () => {
            countryList.sort((a, b) => a.name.localeCompare(b.name));
            countryList.forEach(c => {
                const opt = document.createElement('option');
                opt.value = c.code;
                const flag = getFlagFromCode(c.code);
                opt.textContent = `${flag} ${c.name}`;
                countrySelect.appendChild(opt);
            });

            countrySelect.addEventListener('change', (e) => {
                const code = e.target.value;
                if (code) {
                    updateFromCountry(code);
                }
            });

            // Season button click handlers
            seasonBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    const season = btn.dataset.season;
                    if (season) switchToSeason(season);
                });
            });

            await detectLocation();
        });

        console.log('🌍 Season Toast · Walking Blob loaded!');
        console.log('🚶 The blob now walks around the scene with legs, arms, and personality!');
    </script>
</body>
</html>
